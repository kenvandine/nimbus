<svg width="640" height="460" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"  stop-color="#061320"/>
      <stop offset="60%" stop-color="#0c1e38"/>
      <stop offset="100%" stop-color="#183350"/>
    </linearGradient>
    <linearGradient id="dockGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"  stop-color="#0d1928" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#071018" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="widgetClip">
      <rect x="18" y="158" width="222" height="244" rx="14"/>
    </clipPath>
  </defs>

  <!-- ── Desktop background ── -->
  <rect width="640" height="460" fill="url(#bg)"/>

  <!-- Subtle radial highlight -->
  <ellipse cx="480" cy="160" rx="280" ry="200" fill="#1a4a8a" fill-opacity="0.15"/>

  <!-- ── Running app icons (desktop grid, center-right) ── -->
  <!-- Lemonade icon -->
  <g filter="url(#iconShadow)">
    <rect x="330" y="140" width="60" height="60" rx="15" fill="#1a3a1a"/>
    <text x="360" y="183" font-size="32" text-anchor="middle">🍋</text>
  </g>
  <text x="360" y="214" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.82)" style="text-shadow:0 1px 3px rgba(0,0,0,0.7)">Lemonade</text>

  <!-- Nextcloud icon -->
  <g filter="url(#iconShadow)">
    <rect x="430" y="140" width="60" height="60" rx="15" fill="#001f4e"/>
    <text x="460" y="183" font-size="32" text-anchor="middle">☁️</text>
  </g>
  <text x="460" y="214" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.82)" style="text-shadow:0 1px 3px rgba(0,0,0,0.7)">Nextcloud</text>

  <!-- Home Assistant icon -->
  <g filter="url(#iconShadow)">
    <rect x="530" y="140" width="60" height="60" rx="15" fill="#1a1f40"/>
    <text x="560" y="183" font-size="32" text-anchor="middle">🏠</text>
  </g>
  <text x="560" y="214" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.82)" style="text-shadow:0 1px 3px rgba(0,0,0,0.7)">Home Asst.</text>

  <!-- ── Dock ── -->
  <rect x="170" y="386" width="300" height="62" rx="20" fill="url(#dockGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1" filter="url(#shadow)"/>

  <!-- Dock: App Store -->
  <rect x="186" y="397" width="44" height="44" rx="11" fill="rgba(79,195,247,0.18)" stroke="rgba(79,195,247,0.28)" stroke-width="1"/>
  <text x="208" y="425" font-size="22" text-anchor="middle">🏪</text>

  <!-- Dock: Files -->
  <rect x="240" y="397" width="44" height="44" rx="11" fill="rgba(79,195,247,0.18)" stroke="rgba(79,195,247,0.28)" stroke-width="1"/>
  <text x="262" y="425" font-size="22" text-anchor="middle">📁</text>

  <!-- Dock: Device Info -->
  <rect x="294" y="397" width="44" height="44" rx="11" fill="rgba(79,195,247,0.18)" stroke="rgba(79,195,247,0.28)" stroke-width="1"/>
  <text x="316" y="425" font-size="22" text-anchor="middle">ℹ️</text>

  <!-- Dock: Settings -->
  <rect x="348" y="397" width="44" height="44" rx="11" fill="rgba(79,195,247,0.18)" stroke="rgba(79,195,247,0.28)" stroke-width="1"/>
  <text x="370" y="425" font-size="22" text-anchor="middle">⚙️</text>

  <!-- ── Top-right power button ── -->
  <rect x="578" y="16" width="46" height="46" rx="14" fill="rgba(8,16,28,0.54)" stroke="rgba(255,255,255,0.14)" stroke-width="1" filter="url(#shadow)"/>
  <text x="601" y="45" font-size="22" text-anchor="middle" fill="rgba(255,255,255,0.88)">⏻</text>

  <!-- ═══════════════════════════════════════════
       OpenClaw Widget
  ════════════════════════════════════════════ -->
  <!-- Widget drop shadow (separate rect for blur) -->
  <rect x="18" y="158" width="222" height="244" rx="14" fill="#000" fill-opacity="0.55" filter="url(#shadow)"/>

  <!-- Widget background -->
  <rect x="18" y="158" width="222" height="244" rx="14" fill="#08101c" fill-opacity="0.91" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>

  <!-- ── Header ── -->
  <!-- Green online dot -->
  <circle cx="37" cy="179" r="4.5" fill="#4caf50"/>

  <!-- "OpenClaw" title -->
  <text x="50" y="184" font-size="12.5" font-weight="600" fill="rgba(255,255,255,0.86)">OpenClaw</text>

  <!-- "2 active" pill -->
  <rect x="128" y="170" width="60" height="18" rx="9" fill="rgba(76,175,80,0.22)" stroke="rgba(76,175,80,0.35)" stroke-width="0.75"/>
  <text x="158" y="183" font-size="10" font-weight="700" text-anchor="middle" fill="#81c784">2 active</text>

  <!-- Chevron -->
  <text x="222" y="183" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.32)">▼</text>

  <!-- Header bottom separator -->
  <line x1="18" y1="196" x2="240" y2="196" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- ════════ Agent 1: Claude ════════ -->
  <text x="29" y="219" font-size="16" text-anchor="start">🤖</text>

  <!-- Agent name -->
  <text x="52" y="218" font-size="12" font-weight="600" fill="rgba(255,255,255,0.9)">Claude</text>

  <!-- default badge -->
  <rect x="109" y="207" width="46" height="14" rx="7" fill="rgba(79,195,247,0.16)" stroke="rgba(79,195,247,0.3)" stroke-width="0.75"/>
  <text x="132" y="217.5" font-size="8" font-weight="700" text-anchor="middle" fill="#81d4fa" letter-spacing="0.06em">DEFAULT</text>

  <!-- Session 1 — active, summary text -->
  <circle cx="38" cy="232" r="3.5" fill="#4caf50"/>
  <text x="48" y="232" font-size="11" fill="rgba(255,255,255,0.75)">Editing backend/services/</text>
  <text x="48" y="246" font-size="11" fill="rgba(255,255,255,0.75)">openclaw.py</text>

  <!-- ════════ Agent 2: Research ════════ -->
  <!-- Separator -->
  <line x1="28" y1="262" x2="232" y2="262" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="29" y="280" font-size="16" text-anchor="start">🔬</text>
  <text x="52" y="279" font-size="12" font-weight="600" fill="rgba(255,255,255,0.9)">Research</text>

  <!-- Session 2 — active -->
  <circle cx="38" cy="293" r="3.5" fill="#4caf50"/>
  <text x="48" y="293" font-size="11" fill="rgba(255,255,255,0.75)">Searching Umbrel store for</text>
  <text x="48" y="307" font-size="11" fill="rgba(255,255,255,0.75)">new integrations</text>

  <!-- ════════ Agent 3: Coder ════════ -->
  <!-- Separator -->
  <line x1="28" y1="322" x2="232" y2="322" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="29" y="341" font-size="16" text-anchor="start">💻</text>
  <text x="52" y="340" font-size="12" font-weight="600" fill="rgba(255,255,255,0.9)">Coder</text>

  <!-- Session 3 — idle (dim dot, italic label) -->
  <circle cx="38" cy="355" r="3.5" fill="rgba(255,255,255,0.3)"/>
  <text x="48" y="355" font-size="10" fill="rgba(255,255,255,0.33)" font-style="italic">idle</text>

  <!-- Subtle inner highlight at top of widget (glass effect) -->
  <rect x="19" y="159" width="220" height="30" rx="13" fill="rgba(255,255,255,0.035)"/>
</svg>
