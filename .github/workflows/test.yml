name: Test Suite

on:
  push:
    branches:
      - main
      - production
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/test.yml'
  pull_request:
    branches:
      - main
      - production
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/test.yml'

jobs:
  backend:
    name: Backend Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install "passlib[bcrypt]>=1.7.4" "python-jose[cryptography]>=3.3.0" "sse-starlette>=1.6.0" "acme>=2.6.0" "josepy>=1.13.0"
          pip install pytest pytest-asyncio pytest-mock pytest-cov

      - name: Run Backend Tests
        run: |
          PYTHONPATH=backend pytest --cov=auth --cov=config --cov=services.device_id --cov=services.tls --cov=agent.daemon backend/tests/

  frontend:
    name: Frontend Unit & Component Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci || npm install

      - name: Run Frontend Tests
        run: |
          cd frontend
          npx vitest run --coverage

  smoke:
    name: Service Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install "passlib[bcrypt]>=1.7.4" "python-jose[cryptography]>=3.3.0" "sse-starlette>=1.6.0" "acme>=2.6.0" "josepy>=1.13.0"
          pip install uvicorn httpx

      - name: Run Smoke Tests
        run: |
          python tests/smoke/smoke_test.py

  ui:
    name: Playwright UI & E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci || npm install

      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run UI Tests
        run: |
          cd frontend
          npx playwright test
