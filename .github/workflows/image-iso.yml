name: Build Appliance Image and ISO

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Appliance Model to build'
        required: true
        default: 'nimbus-lemonade'
        type: choice
        options:
          - nimbus-lemonade
          - nimbus-gemma4
      preseed:
        description: 'Enable preseeding of snaps'
        required: true
        default: 'true'
        type: boolean
      channel:
        description: 'Nimbus Snap Channel/Branch (e.g. edge, edge/hostap)'
        required: true
        default: 'edge'
        type: string
      release:
        description: 'Create a GitHub Release (non-edge channels only)'
        required: true
        default: false
        type: boolean
      ssh_key:
        description: 'Optional SSH public key to embed in the system-user assertion'
        required: false
        default: ''
        type: string
      hf_model_repo:
        description: 'HuggingFace model repository to sideload (default: unsloth/Qwen3.5-9B-GGUF)'
        required: false
        default: 'unsloth/Qwen3.5-9B-GGUF'
        type: string
      hf_model_file:
        description: 'HuggingFace model filename to download (default: Qwen3.5-9B-Q4_K_M.gguf)'
        required: false
        default: 'Qwen3.5-9B-Q4_K_M.gguf'
        type: string
      download:
        description: 'Download and sideload the model in the image. If unchecked, only the model spec is saved and the model is pulled from lemonade during OOBE when online.'
        required: true
        default: true
        type: boolean
  schedule:
    # Run once a day at midnight UTC
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  build-image-iso:
    name: Build Image and ISO
    runs-on: ubuntu-24.04
    env:
      GPG_PASSPHRASE: ${{ secrets.SNAP_SIGNING_KEY_PASSPHRASE }}
    steps:
      - name: Free Disk Space
        uses: insightsengineering/disk-space-reclaimer@v1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout Nimbus
        uses: actions/checkout@v4
        with:
          path: nimbus

      - name: Checkout pc-nimbus-gadget
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/pc-nimbus-gadget
          ref: main
          path: pc-amd64-gadget

      - name: Update Nimbus Snap Channel in model definitions
        env:
          CHANNEL: ${{ github.event.inputs.channel || 'edge' }}
        run: |
          python3 -c "
          import os, json
          channel = os.environ['CHANNEL']
          if not channel.startswith('latest/'):
              channel = 'latest/' + channel
          for model in ['nimbus-lemonade', 'nimbus-gemma4']:
              path = f'nimbus/model/{model}.json'
              with open(path, 'r') as f:
                  data = json.load(f)
              for snap in data.get('snaps', []):
                  if snap.get('name') == 'nimbus':
                      snap['default-channel'] = channel
                      break
              with open(path, 'w') as f:
                  json.dump(data, f, indent=4)
                  f.write('\n')
          "

      - name: Install System Dependencies
        run: |
          # Ubuntu 24.04 runners use DEB822 format sources. Pin all URIs to the
          # known-good Azure mirror to avoid transient failures from broken mirrors
          # (e.g. mirror.enzu.com). Fall back to old sources.list format too.
          AZURE_MIRROR="http://azure.archive.ubuntu.com/ubuntu"
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i "s|URIs:.*|URIs: ${AZURE_MIRROR}|g" /etc/apt/sources.list.d/ubuntu.sources
          fi
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i "s|http://[^ ]*archive\.ubuntu\.com/ubuntu|${AZURE_MIRROR}|g" /etc/apt/sources.list
          fi
          # Retry apt-get update up to 3 times to ride out transient mirror issues
          for i in 1 2 3; do
            sudo apt-get update && break
            echo "apt-get update attempt $i failed, retrying in 15s..."
            sleep 15
          done
          sudo apt-get install -y mtools fdisk xz-utils python3-venv python3-pip xorriso squashfs-tools wget

      - name: Install snapcraft and ubuntu-image
        run: |
          sudo snap install snapcraft --classic
          sudo snap install ubuntu-image --classic

      - name: Import GPG Signing Key
        run: |
          mkdir -p ~/.snap/gnupg
          chmod 700 ~/.snap/gnupg
          
          # Create mock pinentry script to bypass /dev/tty prompt
          cat << 'EOF' > ~/.snap/gnupg/pinentry-mock
          #!/bin/bash
          echo "OK Pleased to meet you"
          while read -r line; do
            if [[ "$line" =~ GETPIN ]]; then
              echo "D $GPG_PASSPHRASE"
              echo "OK"
            else
              echo "OK"
            fi
          done
          EOF
          chmod +x ~/.snap/gnupg/pinentry-mock
          
          echo "pinentry-program /home/runner/.snap/gnupg/pinentry-mock" > ~/.snap/gnupg/gpg-agent.conf
          echo "allow-loopback-pinentry" >> ~/.snap/gnupg/gpg-agent.conf
          
          touch ~/.snap/gnupg/gpg.conf
          
          echo "${{ secrets.SNAP_SIGNING_KEY }}" | base64 -d > ~/.snap/gnupg/private.key 2>/dev/null || echo "${{ secrets.SNAP_SIGNING_KEY }}" > ~/.snap/gnupg/private.key
          gpg --homedir ~/.snap/gnupg --batch --import ~/.snap/gnupg/private.key
          chmod -R go-rwx ~/.snap/gnupg
          # Verify the key is loaded
          gpg --homedir ~/.snap/gnupg --list-keys
          # We need to make sure the key name 'my-key' is recognized
          # (Keys generated with snapcraft create-key automatically have UID "my-key")

      - name: Get Nimbus Snap Version
        id: get-version
        env:
          CHANNEL: ${{ github.event.inputs.channel || 'edge' }}
        run: |
          VERSION=$(snap info nimbus | python3 -c "
          import sys, os, re
          channel = os.environ['CHANNEL']
          if not channel.startswith('latest/'):
              channel = 'latest/' + channel
          lines = sys.stdin.read().splitlines()
          channels_start = False
          channel_map = {}
          for line in lines:
              if line.startswith('channels:'):
                  channels_start = True
                  continue
              if channels_start:
                  if not line.startswith('  '): break
                  match = re.match(r'^\s+([^\s:]+):\s+(.+)$', line)
                  if match:
                      channel_map[match.group(1)] = match.group(2).strip()
          ch_order = ['latest/stable', 'latest/candidate', 'latest/beta', 'latest/edge']
          def resolve(ch):
              val = channel_map.get(ch)
              if not val:
                  parts = ch.split('/')
                  if len(parts) > 2:
                      base_ch = '/'.join(parts[:2])
                      val = channel_map.get(base_ch)
              if not val: return None
              if '↑' in val:
                  try:
                      idx = ch_order.index(ch)
                      for i in range(idx - 1, -1, -1):
                          p_val = channel_map.get(ch_order[i])
                          if p_val and '↑' not in p_val: return p_val
                  except ValueError: pass
              return val
          val = resolve(channel)
          print(val.split()[0] if val else 'unknown')
          ")
          echo "NIMBUS_VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Generate timestamp and ISO filename
          TIMESTAMP=$(date +'%Y%m%d%H%M')
          MODEL="${{ github.event.inputs.model || 'nimbus-lemonade' }}"
          ISO_FILENAME="nimbus-appliance-${MODEL}-${VERSION}-${TIMESTAMP}.iso"
          echo "ISO_FILENAME=${ISO_FILENAME}" >> $GITHUB_ENV
          echo "ISO_TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV

      - name: Setup LXD
        run: |
          sudo snap install lxd
          sudo lxd init --auto
          # Add current user and root to lxd group
          sudo usermod -aG lxd $USER
          sudo usermod -aG lxd root
          # Fix docker iptables conflict blocking LXD container internet access
          sudo iptables -P FORWARD ACCEPT

      - name: Add custom sideload partition to gadget config
        env:
          # When sideloading model files use 8000M; when only storing the model
          # spec (model_override.json) a tiny partition is sufficient.
          SIDELOAD_SIZE: ${{ github.event.inputs.download == 'false' && '64M' || '8000M' }}
        run: |
          python3 -c "
          import os
          path = 'pc-amd64-gadget/gadget/gadget-amd64.yaml'
          size = os.environ['SIDELOAD_SIZE']
          with open(path, 'r') as f:
              content = f.read()
          
          partition_def = f'      - name: nimbus-sideload\n        filesystem: ext4\n        type: 0FC63DAF-8483-4772-8E79-3D69D8477DE4\n        size: {size}\n'
          if 'nimbus-sideload' not in content:
              content = content.replace('      - name: ubuntu-data', partition_def + '      - name: ubuntu-data')
              with open(path, 'w') as f:
                  f.write(content)
          print(f'nimbus-sideload partition size: {size}')
          "

      - name: Build Gadget Snap
        run: |
          cd pc-amd64-gadget
          sg lxd -c "snapcraft"

      - name: Generate system-user assertion JSON
        if: ${{ github.event.inputs.ssh_key != '' }}
        env:
          SSH_KEY: ${{ github.event.inputs.ssh_key }}
        run: |
          python3 -c "
          import os, json
          ssh_key = os.environ.get('SSH_KEY', '').strip()
          if ssh_key:
              user_data = {
                  'type': 'system-user',
                  'authority-id': 'EH9A6Xg1QtCjYt4v3QlBVTPLAHDvEIn6',
                  'brand-id': 'EH9A6Xg1QtCjYt4v3QlBVTPLAHDvEIn6',
                  'email': 'dev@localhost',
                  'models': ['nimbus-lemonade', 'nimbus-gemma4'],
                  'name': 'Ubuntu',
                  'username': 'ubuntu',
                  'ssh-keys': [ssh_key],
                  'series': ['16'],
                  'since': '2026-01-01T00:00:00+00:00',
                  'until': '2028-01-01T00:00:00+00:00'
              }
              with open('nimbus/model/user.json', 'w') as f:
                  json.dump(user_data, f, indent=4)
                  f.write('\n')
          "

      - name: Download HuggingFace Model to Sideload
        if: ${{ github.event.inputs.download != 'false' }}
        env:
          # Fall back to Qwen3.5-9B defaults when running on schedule (inputs are empty)
          HF_REPO: ${{ github.event.inputs.hf_model_repo || 'unsloth/Qwen3.5-9B-GGUF' }}
          HF_FILE: ${{ github.event.inputs.hf_model_file || 'Qwen3.5-9B-Q4_K_M.gguf' }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          # model-cache must live inside nimbus/model/ because build.sh resolves
          # MODEL_CACHE_DIR relative to its working directory (nimbus/model/).
          mkdir -p nimbus/model/model-cache/huggingface/hub

          # Write the download script to a file to avoid inline quoting issues
          cat > /tmp/hf_download.py << 'PYEOF'
          import os, sys, json
          from huggingface_hub import hf_hub_download, snapshot_download

          repo     = os.environ['HF_REPO']
          filename = os.environ.get('HF_FILE', '')
          token    = os.environ.get('HF_TOKEN') or None

          cache_dir = os.path.join(os.getcwd(), 'nimbus', 'model', 'model-cache', 'huggingface', 'hub')
          print(f'Downloading {repo} (file: {filename or "all"}) into {cache_dir}...')
          sys.stdout.flush()

          checkpoints = {}

          if filename:
              path = hf_hub_download(repo_id=repo, filename=filename, cache_dir=cache_dir, token=token)
              print(f'Downloaded main model to: {path}')
              print(f'File size: {os.path.getsize(path):,} bytes')
              if os.path.getsize(path) == 0:
                  raise RuntimeError(f'Downloaded file is empty: {path}')
              checkpoints['main'] = f'{repo}:{filename}'
              model_name = f'user.{filename.replace("/", "-")}'
              # Try to download mmproj for vision models
              if 'Qwen3.5-9B-GGUF' in repo:
                  try:
                      mmp = hf_hub_download(repo_id=repo, filename='mmproj-F16.gguf', cache_dir=cache_dir, token=token)
                      print(f'Downloaded mmproj to: {mmp}')
                      checkpoints['mmproj'] = f'{repo}:mmproj-F16.gguf'
                  except Exception as e:
                      print(f'mmproj not found (non-fatal): {e}')
          else:
              path = snapshot_download(repo_id=repo, cache_dir=cache_dir, token=token)
              gguf_files = []
              for root, dirs, files in os.walk(cache_dir):
                  for f in files:
                      if f.endswith('.gguf') or f.endswith('.sollama'):
                          gguf_files.append(f)
              main_file = None
              mmproj_file = None
              for f in gguf_files:
                  if 'mmproj' in f.lower():
                      mmproj_file = f
                  else:
                      fpath = os.path.join(cache_dir, f)
                      if main_file is None or 'Q4_K_M' in f or os.path.getsize(fpath) > os.path.getsize(os.path.join(cache_dir, main_file)):
                          main_file = f
              if main_file:
                  checkpoints['main'] = f'{repo}:{main_file}'
                  model_name = f'user.{main_file.replace("/", "-")}'
              else:
                  checkpoints['main'] = f'{repo}:model'
                  model_name = f'user.{repo.replace("/", "-")}'
              if mmproj_file:
                  checkpoints['mmproj'] = f'{repo}:{mmproj_file}'

          override_path = os.path.join(os.getcwd(), 'nimbus', 'model', 'model-cache', 'model_override.json')
          override_data = {
              'model_name': model_name,
              'checkpoints': checkpoints,
              'labels': ['vision', 'tool-calling'] if 'mmproj' in checkpoints else ['tool-calling'],
              'recipe': 'llamacpp',
              'recipe_options': {'ctx_size': 32768},
              'size': 5.68 if '9B' in repo or '9b' in repo else 5.0,
          }
          with open(override_path, 'w') as f:
              json.dump(override_data, f, indent=2)
          print(f'Created model override at {override_path}:')
          print(json.dumps(override_data, indent=2))
          PYEOF

          python3 /tmp/hf_download.py
          echo "==> model-cache contents:"
          find nimbus/model/model-cache -type f | sort
          du -sh nimbus/model/model-cache

      - name: Write Default Model Configuration
        if: ${{ github.event.inputs.download == 'false' }}
        env:
          HF_REPO: ${{ github.event.inputs.hf_model_repo || 'unsloth/Qwen3.5-9B-GGUF' }}
          HF_FILE: ${{ github.event.inputs.hf_model_file || 'Qwen3.5-9B-Q4_K_M.gguf' }}
        run: |
          mkdir -p nimbus/model/model-cache

          python3 - << 'PYEOF'
          import os, json

          repo     = os.environ['HF_REPO']
          filename = os.environ.get('HF_FILE', '')

          checkpoints = {}
          if filename:
              checkpoints['main'] = f'{repo}:{filename}'
              model_name = f'user.{filename.replace("/", "-")}'
          else:
              checkpoints['main'] = f'{repo}:model'
              model_name = f'user.{repo.replace("/", "-")}'

          # Include mmproj for known vision model repos
          if 'Qwen3.5-9B-GGUF' in repo:
              checkpoints['mmproj'] = f'{repo}:mmproj-F16.gguf'

          labels = ['vision', 'tool-calling'] if 'mmproj' in checkpoints else ['tool-calling']
          size = (
              5.68 if ('9B' in repo or '9b' in repo) else
              22.7 if ('35B' in repo or '35b' in repo) else
              5.0
          )

          override_data = {
              'model_name':     model_name,
              'checkpoints':    checkpoints,
              'labels':         labels,
              'recipe':         'llamacpp',
              'recipe_options': {'ctx_size': 32768},
              'size':           size,
          }

          override_path = os.path.join(
              os.getcwd(), 'nimbus', 'model', 'model-cache', 'model_override.json'
          )
          with open(override_path, 'w') as f:
              json.dump(override_data, f, indent=2)
          print(f'Created model override at {override_path}:')
          print(json.dumps(override_data, indent=2))
          PYEOF

      - name: Build Appliance Image
        run: |
          cd nimbus/model
          MODEL="${{ github.event.inputs.model || 'nimbus-lemonade' }}"
          PRESEED_FLAG="--preseed"
          if [ "${{ github.event.inputs.preseed }}" = "false" ]; then
            PRESEED_FLAG="--no-preseed"
          fi
          
          echo "Building model image for $MODEL with $PRESEED_FLAG"
          # Run build script
          sg lxd -c "./build.sh $MODEL $PRESEED_FLAG"
          
      - name: Cleanup space after image build
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          echo "Removing model cache..."
          rm -rf nimbus/model/model-cache
          echo "Removing build workdirs..."
          sudo rm -rf build-workdir-*
          echo "=== Disk space after cleanup ==="
          df -h

      - name: Download Base Ubuntu Server ISO
        run: |
          # Download Ubuntu Server 26.04 LTS (Noble Numbat is 24.04, 26.04 is the next LTS target)
          # We check if a cached version or direct download is faster, download directly for freshness.
          wget -q https://releases.ubuntu.com/26.04/ubuntu-26.04-live-server-amd64.iso -O ubuntu-server.iso

      - name: Build Appliance Installer ISO
        run: |
          MODEL="${{ github.event.inputs.model || 'nimbus-lemonade' }}"
          IMAGE_PATH="nimbus/model/$MODEL/pc.img.xz"
          
          if [ ! -f "$IMAGE_PATH" ]; then
            echo "Error: image file $IMAGE_PATH not found"
            exit 1
          fi
          
          # Run build-iso.sh using sudo (required by livefs-edit)
          sudo ./nimbus/installer/build-iso.sh ubuntu-server.iso "${{ env.ISO_FILENAME }}" "$IMAGE_PATH"

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nimbus-appliance-image-${{ github.event.inputs.model || 'nimbus-lemonade' }}
          path: nimbus/model/${{ github.event.inputs.model || 'nimbus-lemonade' }}/pc.img.xz

      - name: Upload Installer ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nimbus-appliance-iso-${{ github.event.inputs.model || 'nimbus-lemonade' }}-${{ env.NIMBUS_VERSION }}-${{ env.ISO_TIMESTAMP }}
          path: ${{ env.ISO_FILENAME }}

      - name: Create GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.channel != 'edge' && github.event.inputs.release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODEL="${{ github.event.inputs.model || 'nimbus-lemonade' }}"
          TAG="v${{ env.NIMBUS_VERSION }}"
          
          echo "Creating release for tag $TAG"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, uploading assets to it..."
            gh release upload "$TAG" "${{ env.ISO_FILENAME }}" nimbus/model/$MODEL/pc.img.xz --clobber
          else
            gh release create "$TAG" "${{ env.ISO_FILENAME }}" nimbus/model/$MODEL/pc.img.xz \
              --title "Nimbus Appliance $TAG" \
              --notes "Automated release of Nimbus Appliance ($MODEL) with Nimbus Snap $TAG"
          fi
