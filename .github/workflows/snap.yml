name: Build and Publish Snap

on:
  push:
    branches:
      - main
      - production
    tags:
      - 'v*'
    paths:
      - 'snap/**'
      - 'snapcraft.yaml'
      - 'backend/**'
      - 'frontend/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - '.github/workflows/snap.yml'
  pull_request:
    branches:
      - main
      - production
    paths:
      - 'snap/**'
      - 'snapcraft.yaml'
      - 'backend/**'
      - 'frontend/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - '.github/workflows/snap.yml'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Snap Store release channel/branch (e.g. edge, edge/hostap)'
        required: true
        default: 'edge'
        type: string

jobs:
  build:
    name: Build Snap
    runs-on: ubuntu-24.04
    outputs:
      snap: ${{ steps.build.outputs.snap }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup LXD
        run: |
          sudo snap install lxd
          sudo lxd init --auto
          sudo usermod -aG lxd $USER
          # Fix docker iptables conflict blocking LXD container internet access
          sudo iptables -P FORWARD ACCEPT

      - name: Build LXC Seed Image
        run: |
          sg lxd -c "./scripts/build-lxc-seed.sh"

      - name: Build Snap
        uses: snapcore/action-build@v1
        id: build

      - name: Upload Snap Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nimbus-snap
          path: ${{ steps.build.outputs.snap }}

  publish:
    name: Publish Snap
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - name: Download Snap Artifact
        uses: actions/download-artifact@v4
        with:
          name: nimbus-snap

      - name: Publish Snap to Store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ needs.build.outputs.snap }}
          release: ${{ github.event.inputs.channel || 'edge' }}
